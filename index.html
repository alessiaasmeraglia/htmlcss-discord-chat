<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discord Chat</title>
  <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <!-- Contenitore generale -->
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar"></aside>

        <!-- Tutta la parte destra -->
        <div class="main-content">
                    
        <!-- Header -->
        <header class="topbar">
            <h1>Messaggi</h1>

            <div class="topbar-actions">
                <button class="search-btn">🔍</button>
                <button class="add-friend-btn">Aggiungi amici</button>
            </div>
        </header>

        <!-- Lista chat al centro -->
        <main class="chat-list"></main>

        <!-- Footer -->
        <footer class="bottom-nav">
            <a href="#" class="nav-item">
                <span class="nav-icon">🏠</span>
                <span>Pagina principale</span>
            </a>

            <a href="#" class="nav-item">
                <span class="nav-icon">🔔</span>
                <span>Notifiche</span>
            </a>

            <a href="#" class="nav-item">
                <span class="nav-icon">👤</span>
                <span>Tu</span>
            </a>
        </footer>
        </div>
    </div>
</body>
</html>
